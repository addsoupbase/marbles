<head>
    <title>Marbles</title>

    <link rel="canonical" href="https://addsoupbase.github.io/marbles/edit">
    <link rel="stylesheet" href="../styles.css" fetchpriority="high" blocking>
    <link rel="icon" type="image/x-icon" href="favicon.ico" defer>
    <script src="../../silence.js" defer></script>
    <script src="./script.js" type="module" fetchpriority="high" blocking></script>
    <style>
        .standout {
            border-radius: 2px;
            border-style: solid;
            border-color: teal;
            border-width: 3px;
            padding:3px
        }

        main {
            display: flex;
            justify-content: center;
        }

        .red {
            margin: 10px;
            filter: hue-rotate(180deg) brightness(0.5);
        }

        #hol-der {
            display: grid;
        }

        #controls {
            margin: 30px;
            z-index: 2;
            --user-select:none;
            text-align: center;
            justify-content: center;
            display: ruby;
        }

        #play-button {
            width: 83px
        }

        #right-controls,
        #left-controls {
            width: 290px
        }

        #right-controls {
            justify-self: end;
        }

        #right-button {
            width: 80px;
            position: absolute;
            left: -20px;
            bottom: 50%
        }

        select {
            display: block;
            justify-self: center;
        }

        .racer {
            display: grid;
            margin: 10px;
            padding: 10px;
            border-radius: 15px;
            border-color: seagreen;
            border-style: solid;
            align-items: center;
        }

        .racer>div {
            display: flex;
        }

        .racer>label {
            display: ruby;
        }

        .menu {
            overflow: scroll;
            justify-items: center;
            height: 100vh;
            text-align: center;
            justify-content: center;
            zoom: 0.8;
            inset: 0;
            text-align: center;
            padding: 10px;
            scrollbar-width: none;
            background-color: #4dcd71;
            border: 2px solid #4ac350;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            color: #000000;
            text-align: center;
        }

        #right-menu {
            text-align: center;
        }

        body,
        html {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        #racer-holder {
            width: 260px;
            height: 220px;
            /* scrollbar-width: thin; */
            filter: brightness(1.1);
            overflow-y: scroll;
            overflow-x: hidden;
            /* scrollbar-color: teal rgb(0, 78, 78); */
        }

        /* 
        #racer-holder::-webkit-scrollbar {
            /* background-color: red; */

        */
    </style>
</head>

<body style="display:none">
    <main>
        <h3>its not done so dont expect everything to work</h3>
        <div class="center" id="hol-der">
            <div class="centery menu" id="left-controls">

            </div>
            <div class="centery menu" id="right-controls">
                <!-- <button class="cute-green-button" id="right-button">Hide</button> -->
                <div id="right-menu" style="display:inline-block">
                    <section style="display:inline">
                        <label for="upload-images" style="display:inline-grid">
                            <h2>
                                Images
                            </h2>
                            <button id="upload-images" class="cute-green-button">
                                Upload
                            </button>
                            <input type="file" accept="image/*" multiple hidden>
                        </label>
                    </section>
                    <section>
                        <h2>Marbles</h2>
                        <div id="racer-holder" class="menu cute-green">
                            <h3>No marbles added :&lpar;</h3>
                        </div>
                        <button class="cute-green-button" id="add-marble-button">Add</button>
                    </section>
                    <section>
                        <h2>Marble settings</h2>
                        <label for="marble-size" class="stat">
                            Radius
                            <input id="marble-size" type="number" value="25" step="1">
                        </label>
                        <label for="marble-rest" class="stat">
                            Bounciness
                            <input id="marble-rest" type="number" value="2.5" step="0.25">
                        </label>
                        <label for="marble-friction" class="stat">
                            Friction
                            <input id="marble-friction" type="number" value="0.02" step="0.01">
                        </label>
                        <label for="marble-density" class="stat">
                            Density
                            <input id="marble-density" type="number" value="1">
                        </label>
                        <label for="marble-frictionair" class="stat">
                            Friction Air
                            <input id="marble-frictionair" type="number" value="0.01">
                        </label>
                        <label for="marble-collide" title="can marbles collide with other marbles?" class="stat">
                            Collide
                            <input id="marble-collide" type="checkbox" checked disabled>
                        </label>
                    </section>
                </div>
            </div>
            <iframe src="../play/index.html"></iframe>
            <div id="controls">

                <button class="cute-green-button" id="play-button">Play</button>
                <button class="cute-blue-button cute-green-button" id="place-toggle">Placing</button>
                <span>
                    <select id="place-entity" title="Select an entity to place">
                        <option value="square">Square</option>
                        <option value="triangle">Triangle</option>
                        <option value="goal">Goal</option>
                        <option value="spawn">Spawn</option>
                        <option value="pentagon">Pentagon</option>
                        <option value="hexagon">Hexagon</option>
                        <option value="circle">Circle</option>
                        <option value="svg">Custom Shape</option>
                    </select>
                </span>
                <button class="cute-green-button" id="reset-cam">Reset Camera</button>
                <button class="cute-green-button" id="export-button">Export</button>
                <button class="cute-green-button" id="import-button">Import</button>
            </div>
        </div>

        <!-- <script src="matter.min.js"></script> -->
    </main>
</body hidden>

</html>
