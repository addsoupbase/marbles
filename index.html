<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Improved Design</title>
    <style>
        .danger{
            color: red
        }
        body {
            background-color: #494949;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #cont {
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }

        canvas {
            background-color: #000;
            border-radius: 5px;
        }

        .menu {
            background-color: #28a745;
            color: white;
            border-radius: 5px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 400px;
            max-height: 400px;
            overflow-x: hidden;
            overflow-y: scroll;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu.hidden {
            display: none;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px 15px;
            cursor: pointer;
            transition: background-color 0.3
        }
        button:hover {
            background-color: #0056b3;
        }

        .good {
            background-color: #007bff;
        }

        .good:hover {
            background-color: #0056b3;
        }

        .bad {
            background-color: #dc3545;
        }

        .bad:hover {
            background-color: #c82333;
        }

        #buttonholder {
            display:inline-table;
            flex-direction: row;
            gap: 10px;
            align-items: center;
        }

        #allMarbles {
            overflow-y: auto;
            max-height: 200px;
            border: 1px solid #ddd;
            padding: 10px;
            background-color: #fff;
            border-radius: 4px;
        }

        .hold {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        input.color {
            height: 30px
        }
        input.write,
        input#field {
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100%;
        }

        label {
            margin-left: 5px;
            color: #333;
        }

        p {
            margin: 10px 0;
            color: #666;
            text-align: center;
        }

        .separate {
            margin-top: 20px;
        }

    </style>
</head>

<body>
    <div id="cont">
        <canvas width="500" height="500" id="can"></canvas>

        <div id="data" class="menu">
            <!-- Menu content -->
             <p>Nothing selected...</p>
        </div>

        <div id="data2" class="menu hidden">
            <div id="buttonholder">
                <!-- Buttons or other content for menu 2 -->
            </div>
        </div>

        <div id="data4" class="menu hidden">
            <!-- Content for menu 4 -->
        </div>

        <div id="data3" class="menu hidden">
            <div>
                <button id="marbleAdder" class="good">Add Marble</button>
                <button id="spawnImmediately" class="good">Spawn All</button>
                <button id="killAll" class="bad">Destroy All</button>
                <div class="separate">
                    <input id="bounciness" class="write" type="number" value="0" min="0" max="1" step="0.1">
                    <label for="bounciness">Marble bounce</label>
                </div>
            </div>
            <p class="danger">Local images will <b>NOT</b> be saved for other users!</p>
            <div id="allMarbles"></div>
        </div>
    </div>

    <div class="hold">
        <button class="good" id="saveButton">Save</button>
        <button class="good" id="loadButton">Load</button>
    
        <button class="good" onclick="navigator.clipboard.writeText($('#textData')[0].value)">Copy</button>
        <textarea id="textData" placeholder="Saved Data"></textarea>
        <button class="good" id="put">Put</button>
        <button class="good" id="edit">Edit</button>
        <button class="good" id="marble">Marbles</button>
        <button class="good" id="startButton">Start</button>
      </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="matter.js"></script>
    <script src="script.js" type="module"></script>
</body>
</html>
